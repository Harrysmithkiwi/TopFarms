# TopFarms Supabase project config
# Created in Phase 15 plan 15-03 to pin per-function deploy-time settings explicitly.
# See https://supabase.com/docs/guides/functions/function-configuration

[functions.notify-job-filled]
# Called server-side by DB trigger on_job_filled (migration 017/022). No user-context auth needed —
# function looks up applicants by job_id, no caller-bound logic.
# Gateway JWT check disabled because legacy service_role JWT is rejected by the new gateway as
# UNAUTHORIZED_LEGACY_JWT (discovered 2026-05-03 Phase 15-02 fire — Supabase migrated this project's
# gateway to require non-legacy JWTs at some point between 017's deploy and now).
# Phase 18 hardening: add X-Webhook-Secret header validation inside function code to restore
# defence-in-depth lost by verify_jwt = false.
verify_jwt = false

[functions.send-followup-emails]
# Cron-driven (placement-fee-followup-job from migration 011). Same legacy JWT issue as
# notify-job-filled — gateway check disabled. Function does not use caller-bound logic.
# Phase 18 hardening: add X-Webhook-Secret header validation inside function code.
verify_jwt = false

[functions.acknowledge-placement-fee]
# Called from authenticated employer client (src/pages/dashboard/employer/ApplicantDashboard.tsx:361).
verify_jwt = true

[functions.create-placement-invoice]
# Called from authenticated employer client (src/pages/dashboard/employer/ApplicantDashboard.tsx:423).
verify_jwt = true

[functions.get-resend-stats]
# Cron-driven poller (Phase 20). pg_cron schedules a pg_net.http_post call (plan 20-08)
# that hits this function every 15 minutes; the function fetches Resend stats and caches
# them in public.admin_metrics_cache. No user JWT in flight — verify_jwt is disabled
# at the gateway. Defence-in-depth is enforced INSIDE the function via X-Webhook-Secret
# header validation (per Phase 18 hardening item #15 — same pattern as the future
# notify-job-filled and send-followup-emails secret hardening).
#
# IMPORTANT: This is NOT the CLAUDE.md §5 gateway-trust pattern — that pattern is for
# verify_jwt=true functions where the gateway has already validated a user JWT. This
# function is invoked by pg_cron with no user context.
verify_jwt = false

[functions.stripe-webhook]
# Called by STRIPE's webhook delivery — no Authorization header is ever sent,
# only `stripe-signature`. Without this section the function deployed with the
# default verify_jwt = true and the gateway 401'd
# (UNAUTHORIZED_NO_AUTH_HEADER) every delivery before the handler ran —
# discovered 2026-06-10 by probing the live endpoint. Auth for this function
# is the Stripe signature verification INSIDE the handler
# (constructEventAsync + STRIPE_WEBHOOK_SECRET) — the standard Stripe webhook
# pattern, same shape as notify-job-filled's in-function secret check.
verify_jwt = false

[functions.send-document-status-email]
# Phase 21 Track B (plan 21-06). Invoked from the /admin/documents queue page
# (Wave 5 plan 21-07) via supabase.functions.invoke after a successful admin
# RPC (admin_approve_document / admin_reject_document / admin_request_more_info).
# Admin caller has a valid user JWT — verify_jwt=true so the gateway validates
# upstream and the handler uses the CLAUDE.md §5 gateway-trust JWT decode
# pattern (atob decode, NO adminClient.auth.getUser call).
#
# Defence-in-depth: X-Webhook-Secret header is ALSO validated inside the function
# (Phase 18.1 SC-3 pattern) so even a non-admin user with a valid JWT cannot
# trigger emails — the admin queue page is the only caller that holds the secret.
verify_jwt = true

[functions.lead-intake]
# Webhook lane of the leads intake door (PHASE-LEADS-DESIGN §3). Called by
# Apify scheduled actors (L2) with X-Webhook-Secret (LEAD_INTAKE_SECRET in
# Edge secrets) — same in-function secret pattern as notify-job-filled.
# verify_jwt=false because Apify sends no JWT; consequently any JWT reaching
# the handler is UNVERIFIED (CLAUDE §5), so the founder's capture form does
# NOT call this function — it uses the admin_lead_capture RPC. Both converge
# on _lead_intake() in Postgres (service_role-only grant).
verify_jwt = false

<!DOCTYPE html>
<!--
  TopFarms — Logo Lockup (video asset; draw-on leaf)
  Source lineage: claude.ai/design "Design System" › components/Logo.html + styles.css
  Self-contained: tokens embedded, fonts via CDN, no build / router / external CSS.

  Draw-on sequence (all paths normalised pathLength=1; tween stroke-dashoffset 1 → 0):
    1) [data-anim="logo-leaf-stroke"] — leaf OUTLINE strokes on
    2) [data-anim="logo-leaf"]        — leaf FILL fades in (opacity 0 → 1)
    3) [data-anim="logo-vein"]        — interior vein strokes on
    4) [data-anim="logo-word"]        — wordmark fades/slides in
  The leaf path is exposed both as a fillable shape AND a strokeable outline so the
  film can draw it before flooding the fill.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logo Lockup — TopFarms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  :root {
    --bg: #fafbf9;
    --text: #0b1f10;
    --brand: #16a34a;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); font-family: var(--font-sans); -webkit-font-smoothing: antialiased;
  }
  .logo { display: inline-flex; align-items: center; gap: 12px; }
  .logo__svg { width: 56px; height: 56px; overflow: visible; }
  .logo__leaf { fill: var(--brand); }
  .logo__leaf-stroke { fill: none; stroke: var(--brand); stroke-width: 1.2; stroke-linejoin: round; }
  .logo__vein { fill: none; stroke: var(--bg); stroke-width: 1.5; stroke-linecap: round; }
  .logo__word { font: 600 40px/1 var(--font-sans); letter-spacing: -0.01em; color: var(--text); }

  /* Strokeable paths default to drawn (visible) so the file renders correctly
     when opened directly; the film overrides to 1 → 0 for the draw-on. */
  .logo__leaf-stroke, .logo__vein { stroke-dasharray: 1; stroke-dashoffset: 0; }
</style>
</head>
<body>
  <span class="logo" data-anim="logo-lockup">
    <svg class="logo__svg" viewBox="0 0 24 24" aria-label="TopFarms logo">
      <path class="logo__leaf" data-anim="logo-leaf" d="M3 21C3 12 9 5 21 3C19 13 13 19 3 21Z"></path>
      <path class="logo__leaf-stroke" data-anim="logo-leaf-stroke" pathLength="1" d="M3 21C3 12 9 5 21 3C19 13 13 19 3 21Z"></path>
      <path class="logo__vein" data-anim="logo-vein" pathLength="1" d="M6.5 17.5C9 13 13 8.5 17 6"></path>
    </svg>
    <span class="logo__word" data-anim="logo-word">TopFarms</span>
  </span>
</body>
</html>
